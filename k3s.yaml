apiVersion: v1
kind: Namespace
metadata:
  name: fsp

---
# ============================================
# DB Role: PostgreSQL (Database Only)
# ============================================
apiVersion: v1
kind: Service
metadata:
  name: postgres-svc
  namespace: fsp
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
      nodePort: 30032
  type: NodePort

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: fsp
spec:
  serviceName: "postgres-svc"
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      nodeSelector:
        role: db
      containers:
        - name: postgres
          image: postgres:15
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: fsp
            - name: POSTGRES_USER
              value: changmin
            - name: POSTGRES_PASSWORD
              value: changmin
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi

---
# ============================================
# CORE Role: Coreserver Only
# ============================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: coreserver
  namespace: fsp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: coreserver
  template:
    metadata:
      labels:
        app: coreserver
    spec:
      nodeSelector:
        role: core
      containers:
        - name: coreserver
          image: qixiangme903/server-coreserver:v1.0.4
          ports:
            - containerPort: 8084
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://192.168.0.23:30032/fsp
            - name: SPRING_DATASOURCE_USERNAME
              value: changmin
            - name: SPRING_DATASOURCE_PASSWORD
              value: changmin
            - name: AI_SERVER_URL
              value: http://aiserver-svc.fsp.svc.cluster.local:8000
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"

---
apiVersion: v1
kind: Service
metadata:
  name: coreserver-svc
  namespace: fsp
spec:
  selector:
    app: coreserver
  ports:
    - port: 8084
      targetPort: 8084
  type: ClusterIP

---
# ============================================
# AI Role: AI Server Only
# ============================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiserver
  namespace: fsp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aiserver
  template:
    metadata:
      labels:
        app: aiserver
    spec:
      nodeSelector:
        role: ai
      containers:
        - name: aiserver
          image: qixiangme903/server-aiserver:v1.0.6
          ports:
            - containerPort: 8000
          env:
            - name: HF_HOME
              value: /app/.cache
            - name: TRANSFORMERS_CACHE
              value: /app/.cache
          resources:
            requests:
              memory: "2Gi"
              cpu: "2000m"
            limits:
              memory: "4Gi"
              cpu: "4000m"

---
apiVersion: v1
kind: Service
metadata:
  name: aiserver-svc
  namespace: fsp
spec:
  selector:
    app: aiserver
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP

---
# ============================================
# MASTER Role: Nginx + Routing (Gateway)
# ============================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: fsp
data:
  default.conf: |
    upstream coreserver_backend {
        server coreserver-svc.fsp.svc.cluster.local:8084;
    }
    
    upstream aiserver_backend {
        server aiserver-svc.fsp.svc.cluster.local:8000;
    }
    
    server {
        listen 80;
        
        # Health check
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
        
        # Coreserver routing with CORS
        location /coreserver/ {
            # CORS 헤더 추가
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
            
            # OPTIONS 요청(Preflight) 처리
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }
            
            proxy_pass http://coreserver_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }
        
        # AI Server routing with CORS
        location /aiserver/ {
            # CORS 헤더 추가
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
            
            # OPTIONS 요청(Preflight) 처리
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }
            
            proxy_pass http://aiserver_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }
        
        # Default
        location / {
            return 404;
        }
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: fsp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      nodeSelector:
        role: master
      containers:
        - name: nginx
          image: nginx:latest
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: nginx-conf
          configMap:
            name: nginx-config

---
apiVersion: v1
kind: Service
metadata:
  name: nginx-svc
  namespace: fsp
spec:
  selector:
    app: nginx
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
  type: NodePort